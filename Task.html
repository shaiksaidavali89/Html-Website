<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple HTML Website</title>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>Welcome to My Website</h1>
        <hr>
    </header>

    <!-- ========================= -->
    <!-- Section 1 - Normal Section -->
    <!-- ========================= -->

    <section>
        <h2>About Us</h2>

        <p>
            Welcome to our website. This is a simple HTML page created
            using basic HTML elements. Here you can learn the fundamentals
            of web development.
        </p>

        <button>Learn More</button>
    </section>

    <hr>

    <!-- ========================= -->
    <!-- Section 2 - Form Section -->
    <!-- ========================= -->

    <section>
        <h2>Registration Form</h2>

        <form>

            <label for="name">Full Name:</label><br>
            <input type="text" id="name" name="name"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone"><br><br>

            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password"><br><br>

            <label>Gender:</label><br>

            <input type="radio" id="male" name="gender">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender">
            <label for="female">Female</label>

            <br><br>

            <label for="course">Select Course:</label><br>

            <select id="course" name="course">
                <option>HTML</option>
                <option>CSS</option>
                <option>JavaScript</option>
                <option>Java Full Stack</option>
            </select>

            <br><br>

            <label for="message">Message:</label><br>
            <textarea id="message" rows="5" cols="30"></textarea>

            <br><br>

            <input type="submit" value="Register">
            <input type="reset" value="Clear">

        </form>
    </section>

    <hr>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 My Website. All Rights Reserved.</p>
    </footer>

</body>
</html>
